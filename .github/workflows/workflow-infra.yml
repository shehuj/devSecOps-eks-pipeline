name: Infrastructure — Terraform EKS Provisioning

# Provisions VPC, EKS cluster, ECR, and IAM roles via Terraform.
# Backend (S3 + DynamoDB) is bootstrapped automatically on first run.

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/workflow-infra.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  contents: read
  id-token: write          # Required for OIDC
  pull-requests: write     # For plan comments on PRs
  security-events: write   # SARIF upload to Security tab

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-flight Terraform runs

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_DIR: terraform/

jobs:

  # ── Bootstrap Terraform Backend ─────────────────────────────────────────────
  bootstrap-backend:
    name: Bootstrap TF Backend (S3 + DynamoDB)
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 state bucket (idempotent)
        run: |
          BUCKET="talatwo-pipeline-tfstate"
          REGION="${{ env.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists — skipping"
          else
            echo "Creating bucket $BUCKET..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION"

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            echo "Bucket $BUCKET created and hardened"
          fi

      - name: Create DynamoDB lock table (idempotent)
        run: |
          TABLE="talatwo-pipeline-tflock"
          REGION="${{ env.AWS_REGION }}"

          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" 2>/dev/null; then
            echo "Table $TABLE already exists — skipping"
          else
            echo "Creating DynamoDB table $TABLE..."
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"

            aws dynamodb wait table-exists \
              --table-name "$TABLE" \
              --region "$REGION"

            echo "Table $TABLE ready"
          fi

  # ── IaC Security Scan ────────────────────────────────────────────────────────
  scan-iac:
    name: IaC Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          config_file: .checkov.yaml

      - name: Upload Checkov SARIF to Security tab
        if: always() && hashFiles('checkov-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Trivy — IaC config scan (advisory)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true   # Advisory — Checkov is the hard gate; Trivy alerts but does not block
        with:
          scan-type: config
          scan-ref: terraform/
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  # ── Terraform Validate ───────────────────────────────────────────────────────
  tf-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [bootstrap-backend, scan-iac]
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -recursive

  # ── Terraform Plan ───────────────────────────────────────────────────────────
  tf-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: tf-validate
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="github_org=shehuj" \
            -var="github_repo=devsecops-eks-pipeline" \
            -out=tfplan \
            -input=false \
            -detailed-exitcode
        continue-on-error: true  # exitcode 2 = changes pending (not an error)

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}tfplan
          retention-days: 5

  # ── Terraform Apply ──────────────────────────────────────────────────────────
  tf-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: tf-plan
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || inputs.action == 'apply')
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.TF_DIR }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Output cluster info
        run: |
          echo "ECR URL: $(terraform output -raw ecr_repository_url)"
          echo "Cluster: $(terraform output -raw eks_cluster_name)"
          echo "GHA Role ARN: $(terraform output -raw github_actions_role_arn)"
          echo ""
          echo "Add these to GitHub Secrets:"
          echo "  AWS_ROLE_ARN = $(terraform output -raw github_actions_role_arn)"
          echo "  ECR_REPOSITORY = $(terraform output -raw ecr_repository_url)"

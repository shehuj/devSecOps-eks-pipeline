name: Nightly Security Scan

# Deep security scans that are too slow for every PR but critical to run regularly.
# Runs nightly at 02:00 UTC and can be triggered manually.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-east-1

jobs:

  # ── Gitleaks: full repo history scan ──────────────────────────────────────────
  gitleaks:
    name: Gitleaks — Full History
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── OWASP Dependency Check ────────────────────────────────────────────────────
  owasp-dep-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: flask-store
          path: app/
          format: HTML,SARIF
          args: >
            --enableRetired
            --failOnCVSS 7

      - name: Upload OWASP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Upload OWASP SARIF to Security tab
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dependency-check

  # ── Trivy: scan all ECR images ────────────────────────────────────────────────
  trivy-ecr-scan:
    name: Trivy — ECR Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan — latest image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:dev
          format: sarif
          output: trivy-ecr-nightly.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false    # Include fixable AND unfixed in nightly report
          exit-code: '0'           # Don't fail — report only (alerts via SARIF)
          scanners: vuln           # Gitleaks handles secrets; skip Trivy's built-in secret scan

      - name: Upload Trivy ECR SARIF
        if: always() && hashFiles('trivy-ecr-nightly.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-ecr-nightly.sarif
          category: trivy-ecr-nightly

  # ── Checkov: full repo IaC scan with CIS benchmark ───────────────────────────
  checkov-full:
    name: Checkov — Full IaC + CIS Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkov full scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,helm,dockerfile
          soft_fail: true       # Report only on nightly — don't block the schedule run
          output_format: sarif
          output_file_path: checkov-nightly.sarif
          config_file: .checkov.yaml

      - name: Upload Checkov nightly SARIF
        if: always() && hashFiles('checkov-nightly.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: checkov-nightly.sarif
          category: checkov-nightly

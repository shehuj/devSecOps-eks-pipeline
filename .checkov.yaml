skip-check:
  # CKV_K8S_21: Checkov renders Helm templates with namespace=default because it has
  # no deploy-time context. All templates use {{ .Release.Namespace }} — namespace is
  # set at helm install via --namespace flag.
  - CKV_K8S_21

  # CKV_K8S_43: Pipeline pins images to immutable git SHA tags (github.sha).
  # Digest-based references would require knowing the digest before building,
  # which breaks the pipeline flow.
  - CKV_K8S_43

  # CKV_AWS_39 / CKV_AWS_38: EKS public endpoint is required for GitHub Actions
  # to run helm deploys and kubectl commands without a VPN or bastion host.
  # Restrict public_access_cidrs to your office/runner IPs for production hardening.
  - CKV_AWS_39
  - CKV_AWS_38

  # CKV_AWS_130: Public subnets intentionally assign public IPs — required for
  # the NAT gateway instance and ALB nodes. EKS worker nodes run in private subnets
  # and are not affected by this setting.
  - CKV_AWS_130

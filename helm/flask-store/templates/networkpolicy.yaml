{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "flask-store.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flask-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "flask-store.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 5000
  egress:
    - {}  # Allow all egress — required for DNS resolution and AWS APIs (IRSA)
{{- end }}

# Default values (dev). Override per environment with values-staging.yaml / values-prod.yaml
# Pipeline sets image.repository and image.tag via --set flags

image:
  repository: ""       # Set by pipeline: --set image.repository=<ECR_URL>/flask-store
  tag: ""              # Set by pipeline: --set image.tag=${{ github.sha }}
  pullPolicy: Always   # CKV_K8S_15: Always required; SHA tags make this safe

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}      # IRSA: eks.amazonaws.com/role-arn: <app_irsa_role_arn>

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: ""         # Leave empty for ALB-assigned hostname
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# Pod security context — runs as non-root (mirrors Dockerfile USER appuser)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001    # CKV_K8S_40: high UID to avoid host conflict
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault  # CKV_K8S_31

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: false
  minAvailable: 1

automountServiceAccountToken: false  # CKV_K8S_38: app does not call the K8s API

networkPolicy:
  enabled: true  # CKV2_K8S_6

nodeSelector: {}
tolerations: []
affinity: {}
